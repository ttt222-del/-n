<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 美味餐厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: #ff6b6b; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-save { background: #ff6b6b; color: white; }
        .btn-test { background: #4CAF50; color: white; }
        .btn:hover { opacity: 0.9; }
        .status { padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }
        .status.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .status.error { background: #ffebee; color: #c62828; display: block; }
        .status.loading { background: #e3f2fd; color: #1565c0; display: block; }
        .links { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; display: none; }
        .links.show { display: block; }
        .links a { display: block; color: #ff6b6b; margin: 5px 0; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ 云同步设置</h1>
        <p class="subtitle">配置 GitHub 实现多设备数据同步</p>
        
        <div class="form-group">
            <label>GitHub Token</label>
            <input type="text" id="token" placeholder="粘贴您的 Token">
        </div>
        
        <button class="btn btn-save" onclick="handleSave()">💾 保存配置</button>
        <button class="btn btn-test" onclick="handleTest()">🔗 测试连接</button>
        
        <div id="status" class="status"></div>
        
        <div id="links" class="links">
            <p><strong>✅ 配置成功！您的链接：</strong></p>
            <a id="link1" href="#" target="_blank">顾客点餐页面</a>
            <a id="link2" href="#" target="_blank">商家管理后台</a>
        </div>
    </div>

    <script>
        // Base64 编码函数（支持中文）
        function utf8_to_b64(str) {
            return window.btoa(unescape(encodeURIComponent(str)));
        }

        // 页面加载时读取保存的 Token
        window.onload = function() {
            var savedToken = localStorage.getItem('github_token');
            if (savedToken) {
                document.getElementById('token').value = savedToken;
            }
        };

        // 显示状态
        function showStatus(msg, type) {
            var el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        // 保存配置
        function handleSave() {
            var token = document.getElementById('token').value.trim();
            
            if (!token) {
                showStatus('❌ 请输入 Token', 'error');
                return;
            }
            
            localStorage.setItem('github_token', token);
            showStatus('✅ Token 已保存！正在测试连接...', 'success');
            
            // 自动测试连接
            setTimeout(function() { handleTest(); }, 500);
        }

        // 测试连接
        async function handleTest() {
            var token = document.getElementById('token').value.trim() || localStorage.getItem('github_token');
            
            if (!token) {
                showStatus('❌ 请先输入 Token', 'error');
                return;
            }
            
            showStatus('🔄 正在连接 GitHub...', 'loading');
            
            try {
                var url = 'https://api.github.com/repos/ttt222-del/-n/contents/data/restaurant-data.json';
                
                var response = await fetch(url, {
                    headers: {
                        'Authorization': 'token ' + token,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.status === 404) {
                    showStatus('📝 首次使用，正在创建数据...', 'loading');
                    await createData(token);
                    return;
                }
                
                if (!response.ok) {
                    var error = await response.json();
                    throw new Error(error.message || 'HTTP ' + response.status);
                }
                
                showStatus('✅ 连接成功！数据已同步', 'success');
                showLinks();
                
            } catch (err) {
                showStatus('❌ 连接失败: ' + err.message, 'error');
            }
        }

        // 创建默认数据
        async function createData(token) {
            var data = {
                menu: [
                    {id:1, name:"招牌炒饭", category:"staple", price:28, description:"秘制酱料炒制", image:"🍚", hot:true, available:true},
                    {id:2, name:"红烧牛肉面", category:"staple", price:32, description:"浓郁牛肉汤底", image:"🍜", hot:true, available:true},
                    {id:3, name:"宫保鸡丁", category:"meat", price:38, description:"鸡肉嫩滑花生酥脆", image:"🍗", hot:true, available:true},
                    {id:4, name:"红烧肉", category:"meat", price:48, description:"五花肉炖至软糯", image:"🥩", hot:true, available:true},
                    {id:5, name:"麻婆豆腐", category:"vegetable", price:24, description:"麻辣鲜香", image:"🧊", hot:true, available:true},
                    {id:6, name:"番茄蛋花汤", category:"soup", price:16, description:"酸甜开胃", image:"🍲", hot:false, available:true},
                    {id:7, name:"酸梅汤", category:"drink", price:15, description:"消暑解腻", image:"🫐", hot:true, available:true},
                    {id:8, name:"芒果布丁", category:"dessert", price:22, description:"香甜嫩滑", image:"🍮", hot:true, available:true}
                ],
                orders: [],
                lastUpdate: new Date().toISOString()
            };
            
            // 使用支持中文的编码函数
            var content = utf8_to_b64(JSON.stringify(data, null, 2));
            
            try {
                var url = 'https://api.github.com/repos/ttt222-del/-n/contents/data/restaurant-data.json';
                
                var response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: '初始化餐厅数据',
                        content: content,
                        branch: 'main'
                    })
                });
                
                if (!response.ok) {
                    var err = await response.json();
                    throw new Error(err.message);
                }
                
                showStatus('✅ 初始化成功！已创建 8 个默认菜品', 'success');
                showLinks();
                
            } catch (err) {
                showStatus('❌ 创建失败: ' + err.message, 'error');
            }
        }

        // 显示链接
        function showLinks() {
            document.getElementById('link1').href = 'https://ttt222-del.github.io/-n/';
            document.getElementById('link2').href = 'https://ttt222-del.github.io/-n/admin.html';
            document.getElementById('links').classList.add('show');
        }
    </script>
</body>
</html>
